name: Radar COMEX BD – Actualización diaria

on:
  schedule:
    # 08:00 hora Argentina (UTC-3) = 11:00 UTC
    - cron: '0 11 * * *'
  # Permite correr el job manualmente desde GitHub → Actions → Run workflow
  workflow_dispatch:

permissions:
  contents: write   # necesario para git commit + push

jobs:
  update-radar:
    name: Actualizar alertas COMEX
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN tiene permisos de write gracias a permissions: contents: write
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar motor de actualización
        env:
          # Secret opcional: sin él el motor usa fallback por reglas (sigue funcionando)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/engine/index.ts

      - name: Commitear y pushear cambios en alertas.json
        run: |
          git config user.name  "Radar COMEX Bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/alertas.json
          if git diff --cached --quiet; then
            echo "Sin cambios en alertas.json — nada que commitear."
          else
            git commit -m "chore(radar): actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
